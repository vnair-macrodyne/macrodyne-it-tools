# Docs for the Azure Web Apps Deploy action: https://github.com/azure/functions-action
# More GitHub Actions for Azure: https://github.com/Azure/actions
# More info on Python, GitHub Actions, and Azure Functions: https://aka.ms/python-webapps-actions

name: Build and deploy Python project to Azure Function App - macrodyne-it-functions

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_NAME: 'macrodyne-it-functions2'
  PACKAGE_PATH: 'requisition'
  PYTHON_VERSION: '3.11'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pushd ${{ env.PACKAGE_PATH }}
          python -m pip install --upgrade pip
          pip install -r requirements.txt --target=".python_packages/lib/site-packages"
          popd

      - name: Create deployment zip
        run: |
          pushd ${{ env.PACKAGE_PATH }}
          zip -r ../deployment.zip . \
            --exclude "*.pyc" \
            --exclude "__pycache__/*" \
            --exclude ".git/*" \
            --exclude "local.settings.json"
          popd

      - name: Deploy to Azure Function App
        uses: Azure/functions-action@v1
        with:
          app-name: 'macrodyne-it-functions2'
          package: deployment.zip
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
