# Docs for the Azure Web Apps Deploy action: https://github.com/azure/functions-action
# More GitHub Actions for Azure: https://github.com/Azure/actions
# More info on Python, GitHub Actions, and Azure Functions: https://aka.ms/python-webapps-actions

name: Build and deploy Python app to Azure Web App - macrodyne-requisition

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: 'macrodyne-requisition'
  PACKAGE_PATH: 'requisition'
  PYTHON_VERSION: '3.11'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pushd ${{ env.PACKAGE_PATH }}
          pip install -r requirements.txt --target=".python_packages/lib/site-packages"
          popd

      - name: Zip package
        run: |
          pushd ${{ env.PACKAGE_PATH }}
          zip -r ../app.zip .
          popd

      - name: Verify zip contents
        run: |
          unzip -l app.zip | head -30
          
      - name: Deploy to Azure Web App
        run: |
          az webapp deploy \
            --resource-group rg-macrodyne-it-tools \
            --name macrodyne-requisition \
            --src-path app.zip \
            --type zip \
            --async false
